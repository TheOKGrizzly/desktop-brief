<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#22d3ee" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#02060a"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#22d3ee" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="40%" stop-color="#22d3ee"/>
      <stop offset="60%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="320" fill="#02060a"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#bgGlow)"/>

  <!-- decorative HUD chrome -->
  <line x1="0" y1="40" x2="1280" y2="40" stroke="url(#line)" stroke-width="1"/>
  <line x1="0" y1="280" x2="1280" y2="280" stroke="url(#line)" stroke-width="1"/>

  <!-- left HUD ticks -->
  <g stroke="#22d3ee" stroke-opacity="0.5" font-family="'JetBrains Mono', monospace" fill="#22d3ee">
    <text x="32" y="32" font-size="11" letter-spacing="3">SYSTEM ONLINE</text>
    <text x="32" y="296" font-size="11" letter-spacing="3">DATA STREAM ACTIVE</text>
  </g>

  <!-- right HUD ticks -->
  <g stroke="#22d3ee" stroke-opacity="0.5" font-family="'JetBrains Mono', monospace" fill="#22d3ee" text-anchor="end">
    <text x="1248" y="32" font-size="11" letter-spacing="3">V0.1 / NORMAN-OK</text>
    <text x="1248" y="296" font-size="11" letter-spacing="3">github.com/TheOKGrizzly/desktop-brief</text>
  </g>

  <!-- mini logo on left -->
  <g transform="translate(180 160)" filter="url(#strongGlow)">
    <polygon points="0,-90 78,-45 78,45 0,90 -78,45 -78,-45"
             fill="none" stroke="#22d3ee" stroke-width="2.5"/>
    <polygon points="0,-72 64,-36 64,36 0,72 -64,36 -64,-36"
             fill="#070e16" fill-opacity="0.9" stroke="#22d3ee" stroke-opacity="0.4" stroke-width="1"/>
    <circle r="48" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.55" stroke-dasharray="6 4"/>
    <rect x="-16" y="-16" width="32" height="32" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
    <rect x="-7" y="-7" width="14" height="14" fill="#22d3ee"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(310 130)">
    <text font-family="'Orbitron', 'Rajdhani', sans-serif" font-size="56" font-weight="900"
          letter-spacing="8" fill="#22d3ee" filter="url(#glow)">DESKTOP BRIEF</text>
    <text y="48" font-family="'Rajdhani', sans-serif" font-size="20" font-weight="500"
          letter-spacing="4" fill="#d1d5db" opacity="0.85">Live Jarvis-style desktop briefing</text>
    <text y="78" font-family="'JetBrains Mono', monospace" font-size="13"
          letter-spacing="2" fill="#6b7280">email · calendar · weather · markets · news · grants · system</text>
  </g>

  <!-- right-edge arc reactor accent -->
  <g transform="translate(1180 160)" filter="url(#strongGlow)" opacity="0.85">
    <circle r="56" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.4"/>
    <circle r="40" fill="none" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.6" stroke-dasharray="4 3"/>
    <circle r="22" fill="#02060a" stroke="#22d3ee" stroke-width="1.5"/>
    <circle r="6" fill="#22d3ee"/>
  </g>
</svg>

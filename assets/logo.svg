<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#22d3ee" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#02060a" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#22d3ee" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="512" height="512" fill="#02060a"/>
  <rect width="512" height="512" fill="url(#grid)"/>
  <rect width="512" height="512" fill="url(#bgGlow)"/>

  <!-- hexagonal HUD frame -->
  <g filter="url(#glow)">
    <polygon points="256,40 432,140 432,372 256,472 80,372 80,140"
             fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <polygon points="256,72 404,156 404,356 256,440 108,356 108,156"
             fill="#070e16" fill-opacity="0.85" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="1"/>
  </g>

  <!-- corner ticks -->
  <g stroke="#22d3ee" stroke-width="3" fill="none" opacity="0.9">
    <path d="M 80 140 L 80 110 L 110 110"/>
    <path d="M 432 140 L 432 110 L 402 110"/>
    <path d="M 80 372 L 80 402 L 110 402"/>
    <path d="M 432 372 L 432 402 L 402 402"/>
  </g>

  <!-- scan-line overlay inside the inner hex -->
  <g opacity="0.18">
    <line x1="120" y1="200" x2="392" y2="200" stroke="#22d3ee" stroke-width="0.8"/>
    <line x1="120" y1="232" x2="392" y2="232" stroke="#22d3ee" stroke-width="0.8"/>
    <line x1="120" y1="280" x2="392" y2="280" stroke="#22d3ee" stroke-width="0.8"/>
    <line x1="120" y1="312" x2="392" y2="312" stroke="#22d3ee" stroke-width="0.8"/>
  </g>

  <!-- arc reactor ring -->
  <g transform="translate(256 256)" filter="url(#strongGlow)">
    <circle r="78" fill="none" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.45"/>
    <circle r="62" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.7" stroke-dasharray="6 4"/>
    <circle r="40" fill="#02060a" stroke="#22d3ee" stroke-width="1.5"/>
  </g>

  <!-- ▣ brand glyph (large) -->
  <g transform="translate(256 256)" filter="url(#strongGlow)">
    <rect x="-22" y="-22" width="44" height="44" fill="none" stroke="#22d3ee" stroke-width="3"/>
    <rect x="-9" y="-9" width="18" height="18" fill="#22d3ee"/>
  </g>

  <!-- wordmark "DB" beneath -->
  <text x="256" y="430" text-anchor="middle"
        font-family="'Orbitron', 'Rajdhani', sans-serif"
        font-size="28" font-weight="900" letter-spacing="6"
        fill="#22d3ee" filter="url(#glow)">DESKTOP BRIEF</text>

  <!-- top + bottom HUD ticks -->
  <g stroke="#22d3ee" stroke-opacity="0.6">
    <line x1="200" y1="62" x2="312" y2="62" stroke-width="1"/>
    <line x1="220" y1="58" x2="220" y2="66" stroke-width="1"/>
    <line x1="256" y1="56" x2="256" y2="68" stroke-width="2"/>
    <line x1="292" y1="58" x2="292" y2="66" stroke-width="1"/>
  </g>

  <!-- version badge -->
  <text x="256" y="58" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-size="9"
        fill="#22d3ee" opacity="0.7" letter-spacing="2">V0.1 / NORMAN-OK</text>
</svg>
